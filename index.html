<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妙笔描绘 - 儿童描绘画在线生成器</title>
<meta name="description" content="妙笔描绘是一款儿童描绘画在线生成器，支持图形分类选择、难度分级、分页预览与打印。">
<meta property="og:title" content="妙笔描绘 - 儿童描绘画在线生成器">
<meta property="og:description" content="在线选择图形并快速生成儿童描绘练习页，支持多种线条风格与打印。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-cream: #FFF8F0;
  --bg-warm: #FEF3E2;
  --accent-coral: #FF6B6B;
  --accent-orange: #FFA552;
  --accent-yellow: #FFD93D;
  --accent-green: #6BCB77;
  --accent-blue: #4D96FF;
  --accent-purple: #9B72CF;
  --accent-pink: #FF8FAB;
  --text-dark: #2D3436;
  --text-mid: #636E72;
  --text-light: #B2BEC3;
  --card-bg: #FFFFFF;
  --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 20px;
  --radius-sm: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-cream);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === ANIMATED BACKGROUND === */
.bg-decor {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-decor .blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  animation: blobFloat 20s ease-in-out infinite;
}
.blob:nth-child(1) { width: 400px; height: 400px; background: var(--accent-coral); top: -100px; right: -100px; animation-delay: 0s; }
.blob:nth-child(2) { width: 350px; height: 350px; background: var(--accent-blue); bottom: -80px; left: -80px; animation-delay: -7s; }
.blob:nth-child(3) { width: 300px; height: 300px; background: var(--accent-yellow); top: 40%; left: 30%; animation-delay: -14s; }
.blob:nth-child(4) { width: 250px; height: 250px; background: var(--accent-green); top: 20%; right: 20%; animation-delay: -10s; }

@keyframes blobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -40px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(40px, 20px) scale(1.02); }
}

/* === HEADER === */
.header {
  position: relative;
  z-index: 10;
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  background: rgba(255,248,240,0.7);
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--accent-coral), var(--accent-orange));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  animation: logoWiggle 3s ease-in-out infinite;
}
@keyframes logoWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}
.logo-text {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 26px;
  background: linear-gradient(135deg, var(--accent-coral), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-sub {
  font-size: 12px;
  color: var(--text-light);
  letter-spacing: 2px;
}
.header-actions {
  display: flex; gap: 10px;
}
.btn-header {
  padding: 10px 20px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.3s;
  display: flex; align-items: center; gap: 6px;
}
.btn-help {
  background: var(--card-bg);
  color: var(--text-mid);
  border: 1px solid rgba(0,0,0,0.08);
}
.btn-help:hover { background: #f8f8f8; }

/* === MAIN LAYOUT === */
.main-container {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 40px 60px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 32px;
  min-height: calc(100vh - 100px);
  align-items: start;
}

/* === LEFT PANEL === */
.panel {
  align-self: start;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.panel-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(0,0,0,0.04);
  transition: box-shadow 0.3s;
}
.panel-card:hover {
  box-shadow: var(--shadow-hover);
}
.panel-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title .icon {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

/* Category Tabs */
.category-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.cat-tab {
  padding: 8px 16px;
  border-radius: 50px;
  border: 2px solid transparent;
  background: var(--bg-warm);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.25s;
  color: var(--text-mid);
  white-space: nowrap;
}
.cat-tab:hover { background: #FFE8CC; }
.cat-tab.active {
  background: var(--accent-orange);
  color: #fff;
  border-color: var(--accent-orange);
  box-shadow: 0 3px 12px rgba(255,165,82,0.3);
}

/* Shape Grid */
.shape-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}
.shape-grid::-webkit-scrollbar { width: 5px; }
.shape-grid::-webkit-scrollbar-track { background: transparent; }
.shape-grid::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

.shape-item {
  appearance: none;
  -webkit-appearance: none;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 2px solid #f0f0f0;
  background: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: all 0.25s;
  padding: 8px;
  position: relative;
  font-family: inherit;
}
.shape-item:hover {
  border-color: var(--accent-blue);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(77,150,255,0.15);
}
.shape-item.selected {
  border-color: var(--accent-coral);
  background: #FFF5F5;
  box-shadow: 0 4px 16px rgba(255,107,107,0.2);
}
.shape-item.selected::after {
  content: '✓';
  position: absolute;
  top: 4px; right: 6px;
  font-size: 11px;
  color: #fff;
  background: var(--accent-coral);
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.shape-item svg {
  width: 60%;
  height: 60%;
}
.shape-item .shape-name {
  font-size: 11px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.2;
  pointer-events: none;
}

/* Selected Queue */
.selected-queue {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 42px;
  padding: 12px;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  border: 2px dashed #EEDCBF;
  position: relative;
}
.selected-queue.empty::before {
  content: '点击下方图形添加到这里 ↓';
  color: var(--text-light);
  font-size: 13px;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
}
.queue-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px 6px 6px;
  background: #fff;
  border-radius: 50px;
  font-size: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  animation: chipIn 0.3s ease;
  cursor: grab;
  border: 1px solid #f0f0f0;
}
@keyframes chipIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.queue-chip svg { width: 24px; height: 24px; }
.queue-chip .remove-chip {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: none;
  background: #fee;
  color: var(--accent-coral);
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  margin-left: 2px;
}
.queue-chip .remove-chip:hover {
  background: var(--accent-coral);
  color: #fff;
}

/* Settings */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.setting-label {
  font-size: 14px;
  color: var(--text-mid);
}
.cols-selector {
  display: flex;
  gap: 6px;
}
.col-btn {
  width: 44px; height: 36px;
  border-radius: 10px;
  border: 2px solid #eee;
  background: #fff;
  cursor: pointer;
  font-size: 15px;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.2s;
  color: var(--text-mid);
}
.col-btn:hover { border-color: var(--accent-blue); }
.col-btn.active {
  background: var(--accent-blue);
  border-color: var(--accent-blue);
  color: #fff;
  box-shadow: 0 3px 10px rgba(77,150,255,0.3);
}

.setting-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 2px solid #f0f0f0;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;
  background: var(--bg-cream);
}
.setting-input:focus {
  outline: none;
  border-color: var(--accent-blue);
}
.setting-input::placeholder {
  color: var(--text-light);
}

.line-style-group {
  display: flex;
  gap: 8px;
}
.line-style-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid #eee;
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.2s;
  text-align: center;
  color: var(--text-mid);
}
.line-style-btn:hover { border-color: var(--accent-purple); }
.line-style-btn.active {
  background: var(--accent-purple);
  border-color: var(--accent-purple);
  color: #fff;
  box-shadow: 0 3px 10px rgba(155,114,207,0.3);
}

/* Action Buttons */
.action-group {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.btn-primary {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: 'ZCOOL KuaiLe', cursive;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-generate {
  background: linear-gradient(135deg, var(--accent-coral), var(--accent-orange));
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,107,0.3);
}
.btn-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,107,107,0.4);
}
.btn-generate:active { transform: translateY(0); }

.btn-print {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: #fff;
  box-shadow: 0 4px 16px rgba(77,150,255,0.3);
}
.btn-print:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(77,150,255,0.4);
}

.btn-clear {
  width: 52px;
  background: #fff;
  border: 2px solid #eee;
  color: var(--text-light);
  border-radius: var(--radius-sm);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-clear:hover {
  border-color: var(--accent-coral);
  color: var(--accent-coral);
}

/* === PREVIEW PANEL === */
.preview-area {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(0,0,0,0.04);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.preview-toolbar {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f5f5f5;
}
.preview-toolbar-left {
  display: flex; align-items: center; gap: 12px;
}
.preview-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  color: var(--text-mid);
}
.page-nav {
  display: flex; align-items: center; gap: 8px;
}
.page-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid #eee;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  color: var(--text-mid);
}
.page-btn:hover { background: #f8f8f8; }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-info { font-size: 13px; color: var(--text-light); }

.preview-content {
  flex: 1;
  padding: 24px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  background: #f9f9f9;
}
.preview-content::-webkit-scrollbar { width: 6px; }
.preview-content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

/* Preview Page */
.preview-page {
  width: 100%;
  max-width: 680px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  padding: 40px 36px;
  min-height: 900px;
}
.preview-page-header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px dashed #eee;
}
.preview-page-header h2 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 22px;
  color: var(--text-dark);
}
.preview-page-header .subtitle {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
}
.preview-row {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  align-items: stretch;
}
.preview-cell {
  flex: 1;
  aspect-ratio: 1;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  background: #fff;
  position: relative;
}
.preview-cell svg {
  width: 100%;
  height: 100%;
}
.preview-cell .cell-label {
  position: absolute;
  bottom: 4px;
  font-size: 10px;
  color: var(--text-light);
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 500px;
  text-align: center;
  color: var(--text-light);
}
.empty-state .empty-icon {
  font-size: 80px;
  margin-bottom: 20px;
  opacity: 0.4;
  animation: emptyFloat 3s ease-in-out infinite;
}
@keyframes emptyFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.empty-state h3 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 20px;
  margin-bottom: 8px;
  color: var(--text-mid);
}
.empty-state p { font-size: 14px; }

/* === DIFFICULTY BADGE === */
.diff-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 500;
  margin-left: 6px;
}
.diff-easy { background: #E8F8E8; color: #2E7D32; }
.diff-medium { background: #FFF3E0; color: #E65100; }
.diff-hard { background: #FCE4EC; color: #C62828; }

/* === PRINT STYLES === */
@media print {
  body { background: #fff !important; }
  .header, .panel, .preview-toolbar, .bg-decor, .preview-area { display: none !important; }
  .print-only {
    display: block !important;
    padding: 0;
    margin: 0;
  }
  .print-page {
    page-break-after: always;
    padding: 15mm;
  }
  .print-page:last-child { page-break-after: auto; }
  .print-header {
    text-align: center;
    margin-bottom: 8mm;
    padding-bottom: 4mm;
    border-bottom: 1px dashed #ccc;
    font-family: 'ZCOOL KuaiLe', cursive, KaiTi, STKaiti, serif;
    font-size: 18pt;
  }
  .print-row {
    display: flex;
    gap: 6mm;
    margin-bottom: 4mm;
  }
  .print-cell {
    flex: 1;
    aspect-ratio: 1;
    border: 0.5pt solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3mm;
  }
  .print-cell svg { width: 100%; height: 100%; }
}

.print-only { display: none; }

/* === RESPONSIVE === */
@media (max-width: 1024px) {
  .main-container {
    grid-template-columns: 1fr;
    padding: 20px;
  }
  .header { padding: 16px 20px; }
  .preview-content { padding: 16px; }
}

@media (max-width: 640px) {
  .logo-text { font-size: 20px; }
  .shape-grid { grid-template-columns: repeat(3, 1fr); }
  .preview-page { padding: 20px 16px; }
  .header-actions { display: none; }
}

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text-dark);
  color: #fff;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 14px;
  z-index: 1000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* === Stats Banner === */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 12px;
  background: linear-gradient(135deg, rgba(255,165,82,0.08), rgba(77,150,255,0.08));
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
}
.stat-item {
  flex: 1;
  text-align: center;
}
.stat-num {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 22px;
  color: var(--accent-coral);
}
.stat-label {
  font-size: 11px;
  color: var(--text-light);
}
</style>
</head>
<body>

<div class="bg-decor">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🎨</div>
    <div>
      <div class="logo-text">妙笔描绘</div>
      <div class="logo-sub">儿童描绘画在线生成器</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-header btn-help" onclick="showToast('如有问题请联系我们：support@miaobimh.com')">💡 使用帮助</button>
  </div>
</header>

<main class="main-container">
  <!-- LEFT PANEL -->
  <div class="panel">
    <!-- Stats -->
    <div class="panel-card">
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-num" id="totalShapes">0</div><div class="stat-label">可选图形</div></div>
        <div class="stat-item"><div class="stat-num" id="selectedCount">0</div><div class="stat-label">已选图形</div></div>
        <div class="stat-item"><div class="stat-num" id="pageCount">0</div><div class="stat-label">预计页数</div></div>
      </div>
    </div>

    <!-- Selected Queue -->
    <div class="panel-card">
      <div class="panel-title">
        <span class="icon" style="background:#FFF0F0;color:var(--accent-coral);">📋</span>
        已选图形序列
      </div>
      <div class="selected-queue empty" id="selectedQueue"></div>
    </div>

    <!-- Shape Picker -->
    <div class="panel-card" style="flex:1; min-height:0; display:flex; flex-direction:column;">
      <div class="panel-title">
        <span class="icon" style="background:#F0F4FF;color:var(--accent-blue);">🖼️</span>
        选择图形
      </div>
      <div class="category-tabs" id="categoryTabs"></div>
      <div class="shape-grid" id="shapeGrid" style="flex:1;"></div>
    </div>

    <!-- Settings -->
    <div class="panel-card">
      <div class="panel-title">

// ===== STATE =====
let selectedShapes = [];
let currentCat = '全部';
let cols = 2;
let lineStyle = 'dashed';
let pages = [];
let currentPage = 0;
const STORAGE_KEY = 'childrenDrawingStateV1';

// ===== INIT =====
function init() {
  loadState();
  renderCategories();
  renderShapeGrid();
  renderQueue();
  applySettingsUI();
  updateStats();
  if (selectedShapes.length > 0) {
    generatePreview(false);
  }
}

function getCategories() {
  const cats = new Set(SHAPES.map(s => s.cat));
  return ['全部', ...cats];
}

function renderCategories() {
  const container = document.getElementById('categoryTabs');
  const cats = getCategories();
  container.innerHTML = cats.map(c =>
    `<button class="cat-tab ${c === currentCat ? 'active' : ''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCategories();
  renderShapeGrid();
}

function renderShapeGrid() {
  const grid = document.getElementById('shapeGrid');
  const filtered = currentCat === '全部' ? SHAPES : SHAPES.filter(s => s.cat === currentCat);
  const diffLabels = { easy: '简单', medium: '中等', hard: '较难' };
  const diffClass = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' };

  grid.innerHTML = filtered.map(s => {
    const isSelected = selectedShapes.some(ss => ss.id === s.id);
    return `<button type="button" class="shape-item ${isSelected ? 'selected' : ''}" onclick="toggleShape('${s.id}')" title="${s.name}" aria-label="选择图形：${s.name}" aria-pressed="${isSelected}">
      ${s.svg}
      <span class="shape-name">${s.name}<span class="diff-badge ${diffClass[s.diff]}">${diffLabels[s.diff]}</span></span>
    </button>`;
  }).join('');

  document.getElementById('totalShapes').textContent = SHAPES.length;
}

function toggleShape(id) {
  const shape = SHAPES.find(s => s.id === id);
  if (!shape) return;
  // Always add (allow duplicates for multiple copies)
  selectedShapes.push({ ...shape, _uid: Date.now() + Math.random() });
  renderQueue();
  renderShapeGrid();
  updateStats();
  saveState();
  updatePreview();
}

function removeFromQueue(uid) {
  selectedShapes = selectedShapes.filter(s => s._uid !== uid);
  renderQueue();
  renderShapeGrid();
  updateStats();
  saveState();
  updatePreview();
}

function renderQueue() {
  const queue = document.getElementById('selectedQueue');
  if (selectedShapes.length === 0) {
    queue.innerHTML = '';
    queue.classList.add('empty');
    return;
  }
  queue.classList.remove('empty');
  queue.innerHTML = selectedShapes.map(s =>
    `<div class="queue-chip">
      <span style="display:inline-flex;width:24px;height:24px;">${s.svg}</span>
      <span>${s.name}</span>
      <button class="remove-chip" onclick="removeFromQueue(${s._uid})" aria-label="移除图形：${s.name}">×</button>
    </div>`
  ).join('');
}

function setCols(n) {
  cols = n;
  document.querySelectorAll('.col-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.cols) === n);
  });
  updateStats();
  saveState();
  updatePreview();
}

function setLineStyle(style) {
  lineStyle = style;
  document.querySelectorAll('.line-style-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.style === style);
  });
  saveState();
  updatePreview();
}

function getStrokeAttrs() {
  switch(lineStyle) {
    case 'dashed': return 'stroke="#666" stroke-width="2" stroke-dasharray="4 3"';
    case 'light': return 'stroke="#ccc" stroke-width="2"';
    case 'dots': return 'stroke="#999" stroke-width="2" stroke-dasharray="1 4" stroke-linecap="round"';
    default: return 'stroke="#666" stroke-width="2" stroke-dasharray="4 3"';
  }
}

function applyLineStyle(svgStr) {
  const attrs = getStrokeAttrs();
  // Replace stroke attributes in the SVG
  let result = svgStr;
  // Replace dashed strokes
  result = result.replace(/stroke="#333" stroke-width="2" stroke-dasharray="4 3"/g, attrs);
  // Replace secondary strokes
  const attrs2 = attrs.replace('stroke-width="2"', 'stroke-width="1.5"');
  result = result.replace(/stroke="#333" stroke-width="1\.5" stroke-dasharray="3 2"/g, attrs2);
  result = result.replace(/stroke="#333" stroke-width="1\.5"/g, attrs2);
  // Keep fills for solid dots
  const lightStroke = lineStyle === 'light' ? '#ccc' : lineStyle === 'dots' ? '#999' : '#666';
  result = result.replace(/fill="#333"/g, `fill="${lightStroke}"`);
  result = result.replace(/stroke="#333" stroke-width="1"/g, `stroke="${lightStroke}" stroke-width="1"`);
  result = result.replace(/stroke="#333"/g, `stroke="${lightStroke}"`);
  return result;
}

function updateStats() {
  document.getElementById('selectedCount').textContent = selectedShapes.length;
  const rowsPerPage = cols === 1 ? 5 : cols === 2 ? 4 : 3;
  const totalRows = Math.ceil(selectedShapes.length / cols);
  const pg = Math.ceil(totalRows / rowsPerPage) || 0;
  document.getElementById('pageCount').textContent = pg;
}

function generatePreview(showMessage = true) {
  if (selectedShapes.length === 0) {
    showToast('请先选择至少一个图形');
    return;
  }

  const header = document.getElementById('customHeader').value || '描绘画练习';
  const rowsPerPage = cols === 1 ? 5 : cols === 2 ? 4 : 3;

  // Build rows
  const rows = [];
  for (let i = 0; i < selectedShapes.length; i += cols) {
    const row = selectedShapes.slice(i, i + cols);
    rows.push(row);
  }

  // Build pages
  pages = [];
  for (let i = 0; i < rows.length; i += rowsPerPage) {
    pages.push(rows.slice(i, i + rowsPerPage));
  }

  currentPage = 0;
  renderPreviewPage();
  if (showMessage) {
    showToast(`已生成 ${pages.length} 页预览`);
  }
}

function updatePreview() {
  if (pages.length > 0) {
    generatePreview(false);
  }
}

function handleHeaderInput() {
  saveState();
  updatePreview();
}

function renderPreviewPage() {
  const container = document.getElementById('previewContent');
  const emptyState = document.getElementById('emptyState');

  if (pages.length === 0) {
    container.innerHTML = '';
    container.appendChild(emptyState);
    emptyState.style.display = 'flex';
    updatePageNav();
    return;
  }

  const header = document.getElementById('customHeader').value || '描绘画练习';
  const safeHeader = escapeHtml(header);
  const page = pages[currentPage];

  let html = `<div class="preview-page">
    <div class="preview-page-header">
      <h2>${safeHeader}</h2>
      <div class="subtitle">姓名：________　日期：________　第 ${currentPage + 1}/${pages.length} 页</div>
    </div>`;

  page.forEach(row => {
    html += '<div class="preview-row">';
    for (let i = 0; i < cols; i++) {
      if (row[i]) {
        const styledSvg = applyLineStyle(row[i].svg);
        html += `<div class="preview-cell">${styledSvg}<span class="cell-label">${row[i].name}</span></div>`;
      } else {
        html += `<div class="preview-cell" style="border-style:dashed;border-color:#eee;"></div>`;
      }
    }
    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
  updatePageNav();
}

function updatePageNav() {
  document.getElementById('pageInfo').textContent = pages.length > 0
    ? `第 ${currentPage + 1}/${pages.length} 页` : '第 0/0 页';
  document.getElementById('prevPage').disabled = currentPage <= 0;
  document.getElementById('nextPage').disabled = currentPage >= pages.length - 1;
}

function changePage(dir) {
  currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
  renderPreviewPage();
}

function clearAll() {
  selectedShapes = [];
  pages = [];
  currentPage = 0;
  renderQueue();
  renderShapeGrid();
  updateStats();
  const container = document.getElementById('previewContent');
  container.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">🎨</div>
    <h3>从左侧选择图形开始创作</h3>
    <p>选好图形后点击"生成预览"即可查看效果</p>
  </div>`;
  updatePageNav();
  saveState();
}

function printPages() {
  if (pages.length === 0) {
    showToast('请先生成预览');
    return;
  }

  const header = document.getElementById('customHeader').value || '描绘画练习';
  const safeHeader = escapeHtml(header);
  const printContainer = document.getElementById('printContainer');
  let html = '';

  pages.forEach((page, pi) => {
    html += `<div class="print-page">
      <div class="print-header">${safeHeader}<br><span style="font-size:11pt;color:#999;">姓名：________　日期：________　第 ${pi+1}/${pages.length} 页</span></div>`;
    page.forEach(row => {
      html += '<div class="print-row">';
      for (let i = 0; i < cols; i++) {
        if (row[i]) {
          const styledSvg = applyLineStyle(row[i].svg);
          html += `<div class="print-cell">${styledSvg}</div>`;
        } else {
          html += `<div class="print-cell"></div>`;
        }
      }
      html += '</div>';
    });
    html += '</div>';
  });

  printContainer.innerHTML = html;
  window.print();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  };
  return String(str).replace(/[&<>"']/g, m => map[m]);
}

function saveState() {
  try {
    const payload = {
      selectedIds: selectedShapes.map(s => s.id),
      currentCat,
      cols,
      lineStyle,
      customHeader: document.getElementById('customHeader')?.value || ''
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch (e) {
    console.warn('保存状态失败', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    const validCols = [1, 2, 3];
    const validStyles = ['dashed', 'light', 'dots'];
    const validCats = new Set(['全部', ...SHAPES.map(s => s.cat)]);

    cols = validCols.includes(data.cols) ? data.cols : 2;
    lineStyle = validStyles.includes(data.lineStyle) ? data.lineStyle : 'dashed';
    currentCat = validCats.has(data.currentCat) ? data.currentCat : '全部';

    const selectedIds = Array.isArray(data.selectedIds) ? data.selectedIds : [];
    selectedShapes = selectedIds
      .map(id => SHAPES.find(s => s.id === id))
      .filter(Boolean)
      .map(shape => ({ ...shape, _uid: Date.now() + Math.random() }));

    const input = document.getElementById('customHeader');
    if (input && typeof data.customHeader === 'string') {
      input.value = data.customHeader;
    }
  } catch (e) {
    console.warn('读取状态失败', e);
  }
}

function applySettingsUI() {
  document.querySelectorAll('.col-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.cols) === cols);
  });
  document.querySelectorAll('.line-style-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.style === lineStyle);
  });
}

// Init
init();
</script>
</body>
</html>
